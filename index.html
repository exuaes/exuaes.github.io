<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" href="favicon.png" type="image/x-icon">
<title>andrin.xyz — Service Moved</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --card: #111111;
  --border: #1f1f1f;
  --border-hover: #2a2a2a;
  --text: #f5f5f5;
  --text-mid: #888;
  --text-dim: #555;
  --accent: #fff;
}

body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 2rem;
  -webkit-font-smoothing: antialiased;
}

.container {
  width: 100%;
  max-width: 480px;
  text-align: center;
}

/* Top brand */
.brand {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 48px;
  opacity: 0;
  animation: fade 0.5s ease forwards;
}
.brand-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-dim);
}

/* Icon */
.icon-wrap {
  width: 64px; height: 64px;
  margin: 0 auto 28px;
  display: flex; align-items: center; justify-content: center;
  background: #161616;
  border: 1px solid var(--border);
  border-radius: 16px;
  opacity: 0;
  animation: fade 0.5s ease 0.1s forwards;
}
.icon-wrap svg {
  width: 28px; height: 28px;
  stroke: var(--text);
  stroke-width: 1.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* Headline */
h1 {
  font-size: 32px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 12px;
  line-height: 1.2;
  opacity: 0;
  animation: fade 0.5s ease 0.2s forwards;
}

.subtitle {
  font-size: 15px;
  line-height: 1.6;
  color: var(--text-mid);
  margin-bottom: 36px;
  opacity: 0;
  animation: fade 0.5s ease 0.3s forwards;
}

/* Migration card */
.migration {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
  opacity: 0;
  animation: fade 0.5s ease 0.4s forwards;
}

.migration-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.site-block {
  flex: 1;
  text-align: left;
  min-width: 0;
}
.site-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.site-url {
  font-size: 14px;
  font-weight: 500;
  font-family: 'SF Mono', 'Menlo', monospace;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.site-block.old .site-url { color: var(--text-dim); text-decoration: line-through; }
.site-block.new { text-align: right; }
.site-block.new .site-url { color: var(--text); }

.arrow {
  flex-shrink: 0;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-mid);
}
.arrow svg {
  width: 18px; height: 18px;
  stroke: currentColor;
  stroke-width: 2;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  animation: arrowSlide 2.4s ease-in-out infinite;
}
@keyframes arrowSlide {
  0%, 100% { transform: translateX(-2px); }
  50% { transform: translateX(2px); }
}

/* Button */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px 24px;
  background: #1a1a1a;
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.01em;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s ease;
  opacity: 0;
  animation: fade 0.5s ease 0.5s forwards;
}
.btn:hover {
  background: #222;
  border-color: var(--border-hover);
  transform: translateY(-1px);
}
.btn svg {
  width: 14px; height: 14px;
  stroke: currentColor;
  stroke-width: 2.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* Footer note */
.note {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 20px;
  opacity: 0;
  animation: fade 0.5s ease 0.6s forwards;
}

.copyright {
  font-size: 10px;
  color: #333;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 48px;
  opacity: 0;
  animation: fade 0.5s ease 0.7s forwards;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 480px) {
  h1 { font-size: 26px; }
  .subtitle { font-size: 14px; }
  .migration { padding: 20px 18px; }
  .site-url { font-size: 12px; }
  .migration-row { gap: 10px; }
}
</style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <span class="brand-dot"></span>
      <span>andrin.xyz</span>
    </div>

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24">
        <path d="M17 8l4 4-4 4"/>
        <path d="M3 12h18"/>
        <path d="M3 5v14"/>
      </svg>
    </div>

    <h1>We've moved</h1>
    <p class="subtitle">andrin.xyz has been relocated to a new home with<br>improved performance, new features, and a cleaner experience.</p>

    <div class="migration">
      <div class="migration-row">
        <div class="site-block old">
          <div class="site-label">Previous</div>
          <div class="site-url">andrin.xyz</div>
        </div>
        <div class="arrow">
          <svg viewBox="0 0 24 24">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </div>
        <div class="site-block new">
          <div class="site-label">New</div>
          <div class="site-url">school.eyk.kr</div>
        </div>
      </div>
    </div>

    <a href="https://school.eyk.kr" class="btn">
      Continue to school.eyk.kr
      <svg viewBox="0 0 24 24">
        <path d="M7 17L17 7"/>
        <path d="M7 7h10v10"/>
      </svg>
    </a>

    <p class="note">We apologize for any inconvenience this may have caused.</p>

    <div class="copyright">© EY.K</div>
  </div>
</body>
</html>
